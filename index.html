<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIDE APP</title>
<link rel="icon" href="https://raw.githubusercontent.com/mar-sander/assets/refs/heads/main/favicon.ico">

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap');

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}

body{
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  background:#111;
  color:#eee;
  line-height:1.7;
  padding:24px 16px 48px;
  letter-spacing: 0.05em;
}

.container{
  width:min(100%, 960px);
  margin:0 auto;
}

.page-header{
  text-align:left;
  margin-bottom:28px;
}

.page-title {
    margin: 30px 0 20px 0;
    font-family: "Playfair Display SC", serif;
    font-size: 64px;
    letter-spacing: -0.05em;
    font-weight: 700;
    border-bottom: 5px solid #ffffff;
    display: inline-block;
    padding-bottom: 1px;
    line-height: 20px;
}

.subtitle{
  font-size:0.25em;
}

.page-subtitle{
  margin-top:2px;
  color:#bbb;
  font-size:0.8rem;
}

.tool-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.section{
  margin:0;
  padding:20px;
  background:#181818;
  border:1px solid #2d2d2d;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.28);
}

h2{
  font-family: "Playfair Display SC", serif;
  font-weight: 700;
  margin:0 0 14px;
  padding-bottom:8px;
  border-bottom:1px solid #333;
  font-size: 22px;
      font-weight: 700;
          letter-spacing: 0.08em;
}

.control-row{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.mode-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button,select{
  padding:10px 12px;
  margin:0;
  font-size:1rem;
  font-family:inherit;
}

button{
  cursor:pointer;
  border:none;
  border-radius:10px;
  background:#2b2b2b;
  color:#eee;
  transition:transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

button:hover{
  background:#353535;
  transform:translateY(-1px);
}

button.active{
  background:#10202a;
  color:#c7ecff;
  box-shadow:inset 0 0 0 1px #4fc3f7;
}

label{
  display:block;
  margin:14px 0 6px;
  color:#888;
  font-size:0.8rem;
  font-weight:400;
}

select{
  width:100%;
  background:#101010;
  color:#eee;
  border:1px solid #3a3a3a;
  border-radius:10px;
  outline:none;
}

select:focus{
  border-color:#4fc3f7;
  box-shadow:0 0 0 3px rgba(79,195,247,0.15);
}


.result-title{
  margin:0 0 12px;
  padding:12px 14px;
  background:#101820;
  border:1px solid #244457;
  border-radius:10px;
  color:#c7ecff;
  font-weight:700;
  font-size:1.05rem;
}

.schedule-list{
  display:grid;
  gap:10px;
}

.period{
  display:grid;
  grid-template-columns:74px 1fr;
  gap:0;
  align-items:stretch;
  overflow:hidden;
  background:#121212;
  border:1px solid #262626;
  border-radius:10px;
}

.period-label{
  display:flex;
  align-items:center;
  justify-content:center;

  background:#141414;
  border-right:1px solid #2f2f2f;
  color:#fff;
  font-weight:700;
  font-family: "Playfair Display SC", serif;
  font-size: 27px;
  font-style: italic;
}

.period-content{
  min-height:48px;
  display:flex;
  align-items:center;
  padding:10px 14px;
  color:#eee;
  white-space:pre-line;
  word-break:break-word;
}

.period-content.empty{
  color:#666;
}

.legend-box{
  margin-top:12px;
  padding:10px 12px;
  background:#151515;
  border:1px solid #2f2f2f;
  border-radius:10px;
  color:#bbb;
  font-size:0.92rem;
}

.highlight{
  color:#4fc3f7;
  font-weight:bold;
}

.footer{
  font-family:sans-serif;
  padding-top:50px;
  font-size:14px;
  color:#999;
}

.footer a{
  color:#999;
  text-decoration:none;
}

.footer a:hover{
  color:#fff;
  text-decoration:none;
}

.footer__navi{
  flex-wrap:wrap;
  margin:0 0 1.4rem;
  padding:0;
  list-style:none;
}

.footer__navi li{
  display:inline-block;
}

.footer__navi li:not(:last-child){
  margin-right:16px;
}

.footer__logo{
  display:inline-block;
  margin-bottom:0.5rem;
}

hr{
  height:1px;
  border:0;
  border-top:1px solid #bdbdbd7d;
}

.copyright{
  font-size:12px;
}

@media (max-width:768px){
  body{padding:18px 12px 36px;}
  .tool-grid{gap:16px;}
  .section{padding:16px;border-radius:14px;}
  .period{grid-template-columns:62px 1fr;}
  .period-content{padding:10px 12px;}
}

</style>
</head>
<body>
<div class="container">
  <header class="page-header">
    <h1 class="page-title">oide app<span class="subtitle"></span></h1>
    <div class="page-subtitle">校内活動支援ツール（β版）</div>
  </header>

  <div class="tool-grid">
    <section class="section">
      <h2>setting</h2>
      <div class="mode-buttons">
        <button id="classModeBtn" class="active" type="button">クラスで見る</button>
        <button id="teacherModeBtn" type="button">先生で見る</button>
      </div>

      <label id="targetLabel" for="targetSelect">クラスを選択</label>
      <select id="targetSelect"></select>

      <label for="daySelect">曜日を選択</label>
      <select id="daySelect">
        <option value="月">月曜日</option>
        <option value="火">火曜日</option>
        <option value="水">水曜日</option>
        <option value="木">木曜日</option>
        <option value="金">金曜日</option>
      </select>

    </section>

    <section class="section">
      <h2>timetable</h2>
      <div id="resultTitle" class="result-title"></div>
      <div id="scheduleList" class="schedule-list"></div>
    </section>
  </div>

  <footer class="footer">
    <a href="#" class="footer__logo">
      <img src="https://raw.githubusercontent.com/mar-sander/assets/refs/heads/main/Mlogo3-wh800.png" width="64" alt="MM Logo" />
    </a>
    <ul class="footer__navi flex">
      <li><a href="#" target="_blank">HOME</a></li>
      <li><a href="https://mar-sander.github.io/count-tool/">文字数</a></li>
      <li><a href="https://mar-sander.github.io/day-counter/">〆切±</a></li>
    </ul>
    <hr />
    <p class="copyright">Copyright © M.M. All Rights Reserved.</p>
  </footer>
</div>

const days = ["月", "火", "水", "木", "金"];
const periodLabels = ["1", "2", "3", "4", "5", "6"];

// 前回の選択をブラウザに保存するためのキー
const STORAGE_KEYS = {
  mode: "oideapp_timetable_mode",
  day: "oideapp_timetable_day",
  classTarget: "oideapp_timetable_class",
  teacherTarget: "oideapp_timetable_teacher"
};

let mode = loadValue(STORAGE_KEYS.mode, "class");
if (!["class", "teacher"].includes(mode)) mode = "class";

const classModeBtn = document.getElementById("classModeBtn");
const teacherModeBtn = document.getElementById("teacherModeBtn");
const targetLabel = document.getElementById("targetLabel");
const targetSelect = document.getElementById("targetSelect");
const daySelect = document.getElementById("daySelect");
const resultTitle = document.getElementById("resultTitle");
const scheduleList = document.getElementById("scheduleList");

function loadValue(key, fallback = "") {
  try {
    return localStorage.getItem(key) || fallback;
  } catch (error) {
    return fallback;
  }
}

function saveValue(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (error) {
    // localStorageが使えない環境では、保存せず通常表示のみ行う
  }
}

function getTodayDay() {
  const week = ["日", "月", "火", "水", "木", "金", "土"];
  return week[new Date().getDay()];
}

function setInitialDay() {
  const savedDay = loadValue(STORAGE_KEYS.day, "");
  if (days.includes(savedDay)) {
    daySelect.value = savedDay;
    return;
  }

  const today = getTodayDay();
  if (days.includes(today)) {
    daySelect.value = today;
  }
}

function currentData() {
  return mode === "class" ? classSchedules : teacherSchedules;
}

function currentTargetStorageKey() {
  return mode === "class" ? STORAGE_KEYS.classTarget : STORAGE_KEYS.teacherTarget;
}

function getTeacherDisplayName(name) {
  const subject = teacherSubjects[name] || "";
  return subject ? `${subject} - ${name}T` : `${name}T`;
}

function getTargetDisplayName(name) {
  if (!name) return "";
  return mode === "teacher" ? getTeacherDisplayName(name) : name;
}

function populateTargets() {
  const data = currentData();
  const names = Object.keys(data);
  const savedTarget = loadValue(currentTargetStorageKey(), "");

  targetSelect.innerHTML = "";

  names.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = getTargetDisplayName(name);
    targetSelect.appendChild(option);
  });

  if (names.includes(savedTarget)) {
    targetSelect.value = savedTarget;
  }

  targetLabel.textContent = mode === "class" ? "クラスを選択" : "先生を選択";
  renderSchedule(false);
}

function updateModeButtons() {
  classModeBtn.classList.toggle("active", mode === "class");
  teacherModeBtn.classList.toggle("active", mode === "teacher");
}

function switchMode(nextMode) {
  mode = nextMode;
  saveValue(STORAGE_KEYS.mode, mode);
  updateModeButtons();
  populateTargets();
}

function renderSchedule(shouldSave = true) {
  const data = currentData();
  const target = targetSelect.value;
  const day = daySelect.value;
  const schedule = data[target]?.[day] || [];

  if (shouldSave) {
    saveValue(STORAGE_KEYS.mode, mode);
    saveValue(STORAGE_KEYS.day, day);
    if (target) saveValue(currentTargetStorageKey(), target);
  }

  resultTitle.textContent = target ? `${getTargetDisplayName(target)} / ${day}曜日` : "表示対象を選択してください";
  scheduleList.innerHTML = "";

  periodLabels.forEach((label, index) => {
    const value = schedule[index] || "";
    const row = document.createElement("div");
    row.className = "period";

    const periodLabel = document.createElement("div");
    periodLabel.className = "period-label";
    periodLabel.textContent = label;

    const periodContent = document.createElement("div");
    periodContent.className = "period-content" + (!value || value === "空き" ? " empty" : "");
    periodContent.textContent = value || "未設定";

    row.appendChild(periodLabel);
    row.appendChild(periodContent);
    scheduleList.appendChild(row);
  });
}

classModeBtn.addEventListener("click", () => switchMode("class"));
teacherModeBtn.addEventListener("click", () => switchMode("teacher"));
targetSelect.addEventListener("change", () => renderSchedule(true));
daySelect.addEventListener("change", () => renderSchedule(true));

setInitialDay();
updateModeButtons();
populateTargets();
renderSchedule(true);

</script>
